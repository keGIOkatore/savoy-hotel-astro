backend:
  name: git-gateway
  branch: main

logo_url: "https://tuosito.com/logo_prova_savoy_512x512.png"

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

i18n:
  structure: multiple_folders
  locales: [it, en, de]
  default_locale: it

collections:
  - name: "impostazioni"
    label: "⚙️ Impostazioni Sito"
    files:
      - label: "⏱️ Gestione Orari"
        name: "orari"
        file: "src/data/orari.json"
        fields:
          - {label: "📝 Testo Descrittivo Ristorante", name: "orari_ristorante", widget: "string"}
          - {label: "📝 Testo Descrittivo Spa", name: "orari_spa", widget: "string"}
          
          # WIDGET OROLOGIO
          - {label: "🍽️ Apertura Pranzo", name: "risto_pranzo_ap", widget: "datetime", format: "HH:mm", date_format: false, time_format: "HH:mm", default: "12:30"}
          - {label: "🍽️ Chiusura Pranzo", name: "risto_pranzo_ch", widget: "datetime", format: "HH:mm", date_format: false, time_format: "HH:mm", default: "14:30"}
          - {label: "🍷 Apertura Cena", name: "risto_cena_ap", widget: "datetime", format: "HH:mm", date_format: false, time_format: "HH:mm", default: "19:30"}
          - {label: "🍷 Chiusura Cena", name: "risto_cena_ch", widget: "datetime", format: "HH:mm", date_format: false, time_format: "HH:mm", default: "22:30"}
          
          - {label: "💧 Apertura Spa", name: "spa_ap", widget: "datetime", format: "HH:mm", date_format: false, time_format: "HH:mm", default: "09:00"}
          - {label: "💧 Chiusura Spa", name: "spa_ch", widget: "datetime", format: "HH:mm", date_format: false, time_format: "HH:mm", default: "20:00"}

      # IL MENU DEL RISTORANTE (Genera il file menu_duca.json)
      - label: "📜 Menu Duca D'Aosta"
        name: "menu_duca"
        file: "src/data/menu_duca.json"
        fields:
          - label: "Categorie del Menu (Es. Antipasti, Primi)"
            name: "categorie"
            widget: "list"
            fields:
              - {label: "Nome Categoria", name: "nome", widget: "string"}
              - label: "Piatti"
                name: "piatti"
                widget: "list"
                fields:
                  - {label: "Nome Piatto", name: "nome", widget: "string"}
                  - {label: "Ingredienti", name: "descrizione", widget: "text"}
                  - {label: "Prezzo (€)", name: "prezzo", widget: "number", value_type: "int"}

  - name: "servizi"
    label: "🌟 Servizi Hotel"
    folder: "src/content/servizi"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Servizio", name: "title", widget: "string", i18n: true}
      - {label: "Tag/Categoria (es. Benessere, Gourmet)", name: "categoria", widget: "string", i18n: duplicate}
      - {label: "Immagine", name: "image", widget: "image", i18n: duplicate}
      - {label: "Descrizione", name: "body", widget: "markdown", i18n: true}
      - {label: "Link Pagina Dedicata (Opzionale - es. /ristorante o /spa)", name: "link_esterno", widget: "string", required: false, i18n: duplicate}

  - name: "spa"
    label: "🧖‍♀️ Trattamenti Spa"
    folder: "src/content/spa"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Trattamento", name: "title", widget: "string", i18n: true}
      - {label: "Durata (minuti)", name: "durata", widget: "number", value_type: "int", i18n: duplicate}
      - {label: "Immagine", name: "image", widget: "image", required: false, i18n: duplicate}
      - {label: "Descrizione", name: "body", widget: "markdown", i18n: true}

  - name: "ristorante"
    label: "🍽️ Esperienze Culinarie"
    folder: "src/content/ristorante"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Ambiente/Ristorante", name: "title", widget: "string", i18n: true}
      - {label: "Tag/Categoria (es. Gourmet, Buffet)", name: "categoria", widget: "string", i18n: duplicate}
      - {label: "Immagine", name: "image", widget: "image", i18n: duplicate}
      - {label: "Descrizione", name: "body", widget: "markdown", i18n: true}
      - {label: "Link Pagina Dedicata (Opzionale - es. /menu per il Duca D'Aosta)", name: "link_esterno", widget: "string", required: false, i18n: duplicate}
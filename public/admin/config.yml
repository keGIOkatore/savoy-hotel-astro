backend:
  name: git-gateway
  branch: main

logo_url: "https://savoy-hotel-test.netlify.app/logo_prova_savoy_512x512.png"

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

i18n:
  structure: multiple_folders
  locales: [it, en, de]
  default_locale: it

collections:
  - name: "impostazioni"
    label: "⚙️ Impostazioni"
    files:

      - label: "📞 Contatti & Orari"
        name: "contatti_orari"
        file: "src/data/contatti.json"
        fields:
          - {label: "📱 Numero WhatsApp (solo numeri, es. 390431430144)", name: "whatsapp", widget: "string"}
          - {label: "📞 Telefono (es. +39 0431 430144)", name: "telefono_display", widget: "string"}
          - {label: "✉️ Email", name: "email", widget: "string"}

      - label: "⏱️ Orari di Apertura"
        name: "orari"
        file: "src/data/orari.json"
        fields:
          - {label: "🍽️ Ristorante — Apertura Pranzo", name: "risto_pranzo_ap", widget: "string", hint: "es. 12:30"}
          - {label: "🍽️ Ristorante — Chiusura Pranzo", name: "risto_pranzo_ch", widget: "string", hint: "es. 14:30"}
          - {label: "🍷 Ristorante — Apertura Cena", name: "risto_cena_ap", widget: "string", hint: "es. 19:30"}
          - {label: "🍷 Ristorante — Chiusura Cena", name: "risto_cena_ch", widget: "string", hint: "es. 22:30"}
          - {label: "💧 Spa — Apertura", name: "spa_ap", widget: "string", hint: "es. 09:00"}
          - {label: "💧 Spa — Chiusura", name: "spa_ch", widget: "string", hint: "es. 20:00"}

      - label: "🖼️ Immagini Home Page"
        name: "home_page"
        file: "src/data/home.json"
        fields:
          - {label: "Immagine Principale (Hero)", name: "hero_image", widget: "image"}
          - {label: "Immagine Sezione Servizi", name: "immagine_servizi", widget: "image"}
          - {label: "Immagine Sezione Spa", name: "immagine_spa", widget: "image"}
          - {label: "Immagine Sezione Ristorante", name: "immagine_ristorante", widget: "image"}

      - label: "📜 Menu Duca D'Aosta"
        name: "menu_duca"
        file: "src/data/menu_duca.json"
        fields:
          - label: "Categorie e Piatti"
            name: "categorie"
            widget: "list"
            fields:
              - {label: "Nome Categoria", name: "nome", widget: "string"}
              - label: "Piatti"
                name: "piatti"
                widget: "list"
                fields:
                  - {label: "Nome Piatto", name: "nome", widget: "string"}
                  - {label: "Descrizione", name: "descrizione", widget: "text"}
                  - {label: "Prezzo (€)", name: "prezzo", widget: "number", value_type: "int"}

  - name: "servizi"
    label: "🌟 Servizi Hotel"
    folder: "src/content/servizi"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Servizio", name: "title", widget: "string", i18n: true}
      - {label: "Categoria", name: "categoria", widget: "select", options: ["Il Benessere", "Un Mondo a 5 Stelle", "Viziati un po'", "Attività Esclusive"], default: "Un Mondo a 5 Stelle", i18n: duplicate}
      - {label: "Immagine", name: "image", widget: "image", i18n: duplicate}
      - {label: "Descrizione", name: "body", widget: "text", i18n: true}
      - {label: "Link Esterno (opzionale)", name: "link_esterno", widget: "string", required: false, i18n: duplicate}

  - name: "spa"
    label: "🧖 Trattamenti Spa"
    folder: "src/content/spa"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Trattamento", name: "title", widget: "string", i18n: true}
      - {label: "Durata (minuti)", name: "durata", widget: "number", value_type: "int", i18n: duplicate}
      - {label: "Immagine", name: "image", widget: "image", required: false, i18n: duplicate}
      - {label: "Descrizione", name: "body", widget: "text", i18n: true}

  - name: "ristorante"
    label: "🍽️ Ristorante & Bar"
    folder: "src/content/ristorante"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome", name: "title", widget: "string", i18n: true}
      - {label: "Tipo", name: "categoria", widget: "select", options: ["Fine Dining", "Lounge Bar", "In-Suite Dining", "Buffet Gourmet"], default: "Fine Dining", i18n: duplicate}
      - {label: "Immagine", name: "image", widget: "image", i18n: duplicate}
      - {label: "Descrizione", name: "body", widget: "text", i18n: true}
      - {label: "Link Menu (opzionale)", name: "link_esterno", widget: "string", required: false, i18n: duplicate}
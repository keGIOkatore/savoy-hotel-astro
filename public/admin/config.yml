backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "camere"
    label: "Camere & Suite"
    folder: "src/content/camere"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Camera", name: "title", widget: "string"}
      - {label: "Prezzo a partire da (€)", name: "prezzo", widget: "number", value_type: "int"}
      - {label: "Immagine Principale", name: "image", widget: "image"}
      - {label: "Descrizione", name: "body", widget: "markdown"}

  - name: "spa"
    label: "Trattamenti Spa"
    folder: "src/content/spa"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Trattamento", name: "title", widget: "string"}
      - {label: "Durata (minuti)", name: "durata", widget: "number", value_type: "int"}
      - {label: "Immagine (Opzionale)", name: "image", widget: "image", required: false}
      - {label: "Descrizione", name: "body", widget: "markdown"}

  - name: "ristorante"
    label: "Menù Ristorante"
    folder: "src/content/ristorante"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Piatto", name: "title", widget: "string"}
      - {label: "Categoria", name: "categoria", widget: "select", options: ["Antipasto", "Primo", "Secondo", "Dessert", "Vino"]}
      - {label: "Prezzo (€)", name: "prezzo", widget: "number", value_type: "int"}
      - {label: "Immagine (Opzionale)", name: "image", widget: "image", required: false}
      - {label: "Descrizione / Ingredienti", name: "body", widget: "markdown"}
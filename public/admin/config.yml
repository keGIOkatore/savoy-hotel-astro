backend:
  name: git-gateway
  branch: main

logo_url: "https://savoy-hotel-astro.netlify.app/icon-512x512.png"

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

i18n:
  structure: multiple_folders
  locales: [it, en, de]
  default_locale: it

collections:

  # ─────────────────────────────────────────────
  #   IMPOSTAZIONI GENERALI
  # ─────────────────────────────────────────────
  - name: "impostazioni"
    label: "⚙️ Impostazioni"
    files:

      # ── CONTATTI ──
      - label: "📞 Contatti"
        name: "contatti_orari"
        file: "src/data/contatti.json"
        fields:
          - {label: "📱 Numero WhatsApp (solo numeri)", name: "whatsapp", widget: "string", hint: "es. 390431430144 — senza + o spazi"}
          - {label: "📞 Telefono (con prefisso)", name: "telefono_display", widget: "string", hint: "es. +39 0431 430144"}
          - {label: "✉️ Email", name: "email", widget: "string"}

      # ── ORARI ──
      - label: "⏱️ Orari di Apertura"
        name: "orari"
        file: "src/data/orari.json"
        fields:
          - {label: "🍽️ Ristorante — Apertura Pranzo", name: "risto_pranzo_ap", widget: "string", hint: "es. 12:30"}
          - {label: "🍽️ Ristorante — Chiusura Pranzo", name: "risto_pranzo_ch", widget: "string", hint: "es. 14:30"}
          - {label: "🍷 Ristorante — Apertura Cena",   name: "risto_cena_ap",   widget: "string", hint: "es. 19:30"}
          - {label: "🍷 Ristorante — Chiusura Cena",   name: "risto_cena_ch",   widget: "string", hint: "es. 22:30"}
          - {label: "💧 Spa — Apertura",               name: "spa_ap",          widget: "string", hint: "es. 09:00"}
          - {label: "💧 Spa — Chiusura",               name: "spa_ch",          widget: "string", hint: "es. 20:00"}

      # ── HOME PAGE ──
      - label: "🏠 Home Page"
        name: "home_page"
        file: "src/data/home.json"
        fields:

          # Immagini (modificabili)
          - {label: "🖼️ Immagine Hero (sfondo principale)", name: "hero_image", widget: "image", hint: "Foto orizzontale, almeno 2000px di larghezza."}
          - {label: "🖼️ Immagine Sezione Servizi",          name: "immagine_servizi",    widget: "image"}
          - {label: "🖼️ Immagine Sezione Spa",              name: "immagine_spa",         widget: "image"}
          - {label: "🖼️ Immagine Sezione Ristorante",       name: "immagine_ristorante",  widget: "image"}

          # ── ITALIANO (testi modificabili + campi fissi nascosti) ──
          - label: "🇮🇹 Testi — Italiano"
            name: "it"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Descrizione Servizi",    name: "servizi_descrizione",    widget: "text",   hint: "Testo sotto 'Servizi su Misura'."}
              - {label: "Testo Bottone Servizi",  name: "servizi_bottone",        widget: "string", hint: "es. Scopri le Attenzioni"}
              - {label: "Descrizione Spa",        name: "spa_descrizione",        widget: "text",   hint: "Testo sotto 'Acque Curative'."}
              - {label: "Testo Bottone Spa",      name: "spa_bottone",            widget: "string", hint: "es. Scopri i Trattamenti"}
              - {label: "Descrizione Ristorante", name: "ristorante_descrizione", widget: "text",   hint: "Testo sotto 'Viaggio Sensoriale'."}
              - {label: "Testo Bottone Ristorante", name: "ristorante_bottone",   widget: "string", hint: "es. Scopri le Esperienze"}
              # Campi fissi — non toccare
              - {label: "_", name: "hero_titolo",          widget: "hidden", default: "Savoy"}
              - {label: "_", name: "hero_sottotitolo",     widget: "hidden", default: "Beach Hotel & Thermal Spa"}
              - {label: "_", name: "servizi_occhiello",    widget: "hidden", default: "01. L'Eccellenza"}
              - {label: "_", name: "servizi_titolo",       widget: "hidden", default: "Servizi <br> su <i>Misura</i>."}
              - {label: "_", name: "spa_occhiello",        widget: "hidden", default: "02. Il Benessere"}
              - {label: "_", name: "spa_titolo",           widget: "hidden", default: "<i>Acque</i> <br> Curative."}
              - {label: "_", name: "ristorante_occhiello", widget: "hidden", default: "03. Il Gusto"}
              - {label: "_", name: "ristorante_titolo",    widget: "hidden", default: "<i>Viaggio</i> <br> Sensoriale."}
              - {label: "_", name: "attenzioni_occhiello", widget: "hidden", default: "Viziati un po'"}
              - {label: "_", name: "attenzioni_titolo",    widget: "hidden", default: "<i>Attenzioni</i> Esclusive."}
              - {label: "_", name: "box1_titolo",          widget: "hidden", default: "Spiaggia Privata"}
              - {label: "_", name: "box1_sub",             widget: "hidden", default: "Settore VIP"}
              - {label: "_", name: "box1_link",            widget: "hidden", default: "/servizi"}
              - {label: "_", name: "box2_titolo",          widget: "hidden", default: "Tunnel Termale"}
              - {label: "_", name: "box2_sub",             widget: "hidden", default: "Accesso Diretto"}
              - {label: "_", name: "box2_link",            widget: "hidden", default: "/spa"}
              - {label: "_", name: "box3_titolo",          widget: "hidden", default: "Garage Coperto"}
              - {label: "_", name: "box3_sub",             widget: "hidden", default: "Colonnine Elettriche"}
              - {label: "_", name: "box3_link",            widget: "hidden", default: "/servizi"}
              - {label: "_", name: "box4_titolo",          widget: "hidden", default: "Noleggio Bici"}
              - {label: "_", name: "box4_sub",             widget: "hidden", default: "Esplora Bibione"}
              - {label: "_", name: "box4_link",            widget: "hidden", default: "/servizi"}

          # ── ENGLISH (testi modificabili + campi fissi nascosti) ──
          - label: "🇬🇧 Testi — English"
            name: "en"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Services Description",   name: "servizi_descrizione",    widget: "text"}
              - {label: "Services Button",         name: "servizi_bottone",        widget: "string"}
              - {label: "Spa Description",         name: "spa_descrizione",        widget: "text"}
              - {label: "Spa Button",              name: "spa_bottone",            widget: "string"}
              - {label: "Restaurant Description",  name: "ristorante_descrizione", widget: "text"}
              - {label: "Restaurant Button",       name: "ristorante_bottone",     widget: "string"}
              # Campi fissi — non toccare
              - {label: "_", name: "hero_titolo",          widget: "hidden", default: "Savoy"}
              - {label: "_", name: "hero_sottotitolo",     widget: "hidden", default: "Beach Hotel & Thermal Spa"}
              - {label: "_", name: "servizi_occhiello",    widget: "hidden", default: "01. Excellence"}
              - {label: "_", name: "servizi_titolo",       widget: "hidden", default: "Tailor-made <br> <i>Services</i>."}
              - {label: "_", name: "spa_occhiello",        widget: "hidden", default: "02. Wellness"}
              - {label: "_", name: "spa_titolo",           widget: "hidden", default: "Healing <br> <i>Waters</i>."}
              - {label: "_", name: "ristorante_occhiello", widget: "hidden", default: "03. Taste"}
              - {label: "_", name: "ristorante_titolo",    widget: "hidden", default: "Sensory <br> <i>Journey</i>."}
              - {label: "_", name: "attenzioni_occhiello", widget: "hidden", default: "Treat yourself"}
              - {label: "_", name: "attenzioni_titolo",    widget: "hidden", default: "Exclusive <i>Privileges</i>."}
              - {label: "_", name: "box1_titolo",          widget: "hidden", default: "Private Beach"}
              - {label: "_", name: "box1_sub",             widget: "hidden", default: "VIP Sector"}
              - {label: "_", name: "box1_link",            widget: "hidden", default: "/en/servizi"}
              - {label: "_", name: "box2_titolo",          widget: "hidden", default: "Thermal Tunnel"}
              - {label: "_", name: "box2_sub",             widget: "hidden", default: "Direct Access"}
              - {label: "_", name: "box2_link",            widget: "hidden", default: "/en/spa"}
              - {label: "_", name: "box3_titolo",          widget: "hidden", default: "Covered Garage"}
              - {label: "_", name: "box3_sub",             widget: "hidden", default: "EV Charging"}
              - {label: "_", name: "box3_link",            widget: "hidden", default: "/en/servizi"}
              - {label: "_", name: "box4_titolo",          widget: "hidden", default: "Bike Rental"}
              - {label: "_", name: "box4_sub",             widget: "hidden", default: "Explore Bibione"}
              - {label: "_", name: "box4_link",            widget: "hidden", default: "/en/servizi"}

          # ── DEUTSCH (testi modificabili + campi fissi nascosti) ──
          - label: "🇩🇪 Testi — Deutsch"
            name: "de"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Beschreibung Dienstleistungen", name: "servizi_descrizione",    widget: "text"}
              - {label: "Button Dienstleistungen",       name: "servizi_bottone",        widget: "string"}
              - {label: "Beschreibung Spa",              name: "spa_descrizione",        widget: "text"}
              - {label: "Button Spa",                    name: "spa_bottone",            widget: "string"}
              - {label: "Beschreibung Restaurant",       name: "ristorante_descrizione", widget: "text"}
              - {label: "Button Restaurant",             name: "ristorante_bottone",     widget: "string"}
              # Campi fissi — non toccare
              - {label: "_", name: "hero_titolo",          widget: "hidden", default: "Savoy"}
              - {label: "_", name: "hero_sottotitolo",     widget: "hidden", default: "Beach Hotel & Thermal Spa"}
              - {label: "_", name: "servizi_occhiello",    widget: "hidden", default: "01. Exzellenz"}
              - {label: "_", name: "servizi_titolo",       widget: "hidden", default: "Maßgeschneiderte <br> <i>Services</i>."}
              - {label: "_", name: "spa_occhiello",        widget: "hidden", default: "02. Wellness"}
              - {label: "_", name: "spa_titolo",           widget: "hidden", default: "Heilende <br> <i>Quellen</i>."}
              - {label: "_", name: "ristorante_occhiello", widget: "hidden", default: "03. Genuss"}
              - {label: "_", name: "ristorante_titolo",    widget: "hidden", default: "Sinnliche <br> <i>Reise</i>."}
              - {label: "_", name: "attenzioni_occhiello", widget: "hidden", default: "Gönnen Sie sich etwas"}
              - {label: "_", name: "attenzioni_titolo",    widget: "hidden", default: "Exklusive <i>Annehmlichkeiten</i>."}
              - {label: "_", name: "box1_titolo",          widget: "hidden", default: "Privatstrand"}
              - {label: "_", name: "box1_sub",             widget: "hidden", default: "VIP-Bereich"}
              - {label: "_", name: "box1_link",            widget: "hidden", default: "/de/servizi"}
              - {label: "_", name: "box2_titolo",          widget: "hidden", default: "Thermentunnel"}
              - {label: "_", name: "box2_sub",             widget: "hidden", default: "Direkter Zugang"}
              - {label: "_", name: "box2_link",            widget: "hidden", default: "/de/spa"}
              - {label: "_", name: "box3_titolo",          widget: "hidden", default: "Tiefgarage"}
              - {label: "_", name: "box3_sub",             widget: "hidden", default: "E-Ladestationen"}
              - {label: "_", name: "box3_link",            widget: "hidden", default: "/de/servizi"}
              - {label: "_", name: "box4_titolo",          widget: "hidden", default: "Fahrradverleih"}
              - {label: "_", name: "box4_sub",             widget: "hidden", default: "Bibione entdecken"}
              - {label: "_", name: "box4_link",            widget: "hidden", default: "/de/servizi"}

      # ── MENU DUCA D'AOSTA ──
      - label: "📜 Menu Duca D'Aosta"
        name: "menu_duca"
        file: "src/data/menu_duca.json"
        fields:
          - label: "Categorie e Piatti"
            name: "categorie"
            widget: "list"
            fields:
              - {label: "Nome Categoria", name: "nome", widget: "string"}
              - label: "Piatti"
                name: "piatti"
                widget: "list"
                fields:
                  - {label: "Nome Piatto",  name: "nome",        widget: "string"}
                  - {label: "Descrizione",  name: "descrizione", widget: "text"}
                  - {label: "Prezzo (€)",   name: "prezzo",      widget: "number", value_type: "int"}

  # ─────────────────────────────────────────────
  #   SERVIZI HOTEL
  # ─────────────────────────────────────────────
  - name: "servizi"
    label: "🌟 Servizi Hotel"
    folder: "src/content/servizi"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Servizio", name: "title",    widget: "string", i18n: true}
      - {label: "Categoria",     name: "categoria", widget: "select", options: ["Il Benessere", "Un Mondo a 5 Stelle", "Viziati un po'", "Attività Esclusive"], default: "Un Mondo a 5 Stelle", i18n: duplicate}
      - {label: "Immagine",      name: "image",     widget: "image",  i18n: duplicate}
      - {label: "Descrizione",   name: "body",      widget: "markdown", i18n: true}
      - {label: "Link Esterno (opzionale)", name: "link_esterno", widget: "string", required: false, i18n: duplicate, hint: "Lascia vuoto per mostrare il bottone WhatsApp. Inserisci un URL solo se vuoi rimandare a una pagina esterna."}

  # ─────────────────────────────────────────────
  #   TRATTAMENTI SPA
  # ─────────────────────────────────────────────
  - name: "spa"
    label: "🧖 Trattamenti Spa"
    folder: "src/content/spa"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Trattamento", name: "title",   widget: "string", i18n: true}
      - {label: "Durata",           name: "durata",  widget: "number", value_type: "int", i18n: duplicate, hint: "Inserisci solo il numero in minuti. es. 60"}
      - {label: "Immagine",         name: "image",   widget: "image",  required: false, i18n: duplicate}
      - {label: "Descrizione",      name: "body",    widget: "markdown", i18n: true}

  # ─────────────────────────────────────────────
  #   RISTORANTE & BAR
  # ─────────────────────────────────────────────
  - name: "ristorante"
    label: "🍽️ Ristorante & Bar"
    folder: "src/content/ristorante"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome",      name: "title",     widget: "string", i18n: true}
      - {label: "Tipo",      name: "categoria", widget: "select", options: ["Fine Dining", "Lounge Bar", "In-Suite Dining", "Buffet Gourmet"], default: "Fine Dining", i18n: duplicate}
      - {label: "Immagine",  name: "image",     widget: "image",  i18n: duplicate}
      - {label: "Descrizione", name: "body",    widget: "markdown", i18n: true}
      - {label: "Link Menu (opzionale)", name: "link_esterno", widget: "string", required: false, i18n: duplicate, hint: "Inserisci l'URL del menu se vuoi aggiungere un link esterno."}
